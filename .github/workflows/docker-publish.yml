name: Build and Push Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      penpot_version:
        description: "Penpot version to build (e.g. 2.13.3, develop)"
        required: true
        default: "develop"

env:
  DOCKERHUB_REPO: sebathi/penpot-mcp-docker

jobs:
  # On push to main: rebuild develop tag
  build-on-push:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (develop)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.DOCKERHUB_REPO }}:develop
          cache-from: type=gha,scope=develop
          cache-to: type=gha,mode=max,scope=develop
          build-args: |
            PENPOT_VERSION=develop

  # Manual trigger: build a specific version
  build-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (${{ github.event.inputs.penpot_version }})
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKERHUB_REPO }}:${{ github.event.inputs.penpot_version }}
          cache-from: type=gha,scope=${{ github.event.inputs.penpot_version }}
          cache-to: type=gha,mode=max,scope=${{ github.event.inputs.penpot_version }}
          build-args: |
            PENPOT_VERSION=${{ github.event.inputs.penpot_version }}
